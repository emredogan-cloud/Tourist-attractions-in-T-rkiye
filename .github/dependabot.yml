version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      next-react:
        patterns: ["next", "react", "react-dom", "@types/react*"]
      radix:
        patterns: ["@radix-ui/*"]
      tooling:
        patterns: ["typescript", "@biomejs/*", "vitest", "@playwright/*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
